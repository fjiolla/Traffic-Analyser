<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark gradient background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Brain outline -->
  <path d="M16 8 C11 8, 7 11, 7 15 C7 18, 9 20, 11 21 C10 22, 10 24, 12 25 C14 26, 16 25, 16 24" stroke="#34d399" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M16 8 C21 8, 25 11, 25 15 C25 18, 23 20, 21 21 C22 22, 22 24, 20 25 C18 26, 16 25, 16 24" stroke="#60a5fa" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Neural nodes -->
  <circle cx="12" cy="13" r="1.8" fill="#34d399"/>
  <circle cx="16" cy="12" r="2" fill="#a78bfa"/>
  <circle cx="20" cy="13" r="1.8" fill="#60a5fa"/>
  <circle cx="16" cy="17" r="2.2" fill="#c4b5fd"/>
  <circle cx="13" cy="19" r="1.4" fill="#34d399"/>
  <circle cx="19" cy="19" r="1.4" fill="#60a5fa"/>

  <!-- Neural links -->
  <line x1="12" y1="13" x2="16" y2="12" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  <line x1="16" y1="12" x2="20" y2="13" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <line x1="12" y1="13" x2="16" y2="17" stroke="#34d399" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="13" x2="16" y2="17" stroke="#60a5fa" stroke-width="1" opacity="0.7"/>
  <line x1="13" y1="19" x2="16" y2="17" stroke="#34d399" stroke-width="1" opacity="0.7"/>
  <line x1="19" y1="19" x2="16" y2="17" stroke="#60a5fa" stroke-width="1" opacity="0.7"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
</svg>
